<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jrc Personal Website</title>
  <style>
    /* Reset & base styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; line-height: 1.6; background: #f4f4f9; color: #333; }

    header {
      background: #4CAF50;
      color: white;
      padding: 1rem;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #333;
    }
    nav a {
      color: white;
      padding: 1rem;
      text-decoration: none;
    }
    nav a:hover {
      background: #4CAF50;
    }

    main {
      padding: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
    }
    section {
      flex: 1 1 300px;
      margin: 1rem;
      padding: 1rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #333;
      color: white;
      margin-top: 2rem;
    }

    /* Responsive tweaks */
    @media (max-width: 768px) {
      nav { flex-direction: column; }
      nav a { text-align: center; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Personal Website</h1>
    <p>Dynamic, responsive, and hosted with GitHub + Vercel</p>
  </header>

  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <main>
    <section id="about">
      <h2>About Me</h2>
      <p>Hello! I’m Jayaram, exploring AI, web development, and cybersecurity. This site is my digital playground.</p>
    </section>

    <section id="projects">
      <h2>Projects</h2>
      <ul id="project-list">
        <!-- Dynamic content will be injected here -->
      </ul>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <form id="contact-form">
        <label>Name:</label><br>
        <input type="text" id="name" required><br><br>
        <label>Message:</label><br>
        <textarea id="message" required></textarea><br><br>
        <button type="submit">Send</button>
      </form>
      <p id="form-response"></p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 JrcBpna | Hosted on Vercel</p>
  </footer>

  <script>
    // Example dynamic content injection
    const projects = [
      { name: "Personal Website", link: "https://jrc-personal-website-repo.vercel.app" },
      { name: "DemoPractice Repo", link: "https://github.com/JrcBpna/DemoPractice" }
    ];

    const projectList = document.getElementById("project-list");
    projects.forEach(p => {
      const li = document.createElement("li");
      li.innerHTML = `<a href="${p.link}" target="_blank">${p.name}</a>`;
      projectList.appendChild(li);
    });

    // Simple form handler
    document.getElementById("contact-form").addEventListener("submit", e => {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const message = document.getElementById("message").value;
      document.getElementById("form-response").textContent =
        `Thanks, ${name}! Your message has been received: "${message}"`;
      e.target.reset();
    });
  </script>
</body>
</html>
